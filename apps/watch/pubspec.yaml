name: the_eye_watch
description: THE EYE Wear OS smartwatch app — SOS, alerts, location, pairing, standalone mode.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.4
  geolocator: ^13.0.2
  uuid: ^4.5.1
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/the-eye-logo.png
    - assets/images/brand/

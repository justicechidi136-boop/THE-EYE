name: the-eye

services:
  postgres-postgis:
    image: postgis/postgis:16-3.4
    container_name: the-eye-postgres-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-the_eye}
      POSTGRES_USER: ${POSTGRES_USER:-the_eye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - the-eye-internal

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    container_name: the-eye-pgbouncer
    profiles: ["pooling"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-the_eye}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres-postgis:5432/${POSTGRES_DB:-the_eye}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      SERVER_RESET_QUERY: DISCARD ALL
    ports:
      - "127.0.0.1:${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres-postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - the-eye-internal

  redis:
    image: redis:7-alpine
    container_name: the-eye-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - the-eye-internal

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: the-eye-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-the_eye_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - the-eye-internal

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    container_name: the-eye-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-the_eye_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:-the-eye}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc anonymous set none local/$${S3_BUCKET};
      "
    networks:
      - the-eye-internal

  livekit:
    image: livekit/livekit-server:v1.8
    container_name: the-eye-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit/livekit.yaml"]
    environment:
      LIVEKIT_KEYS: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}:${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
    ports:
      - "127.0.0.1:${LIVEKIT_HTTP_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_RTC_UDP_PORT:-7882}:7882/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "livekit-server", "--version"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - the-eye-internal

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: production
    image: the-eye-api:${THE_EYE_IMAGE_TAG:-local}
    container_name: the-eye-api
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL:-${DATABASE_URL}}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-the-eye}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-the_eye_minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      LIVE_LOCATION_LINK_SECRET: ${LIVE_LOCATION_LINK_SECRET:?LIVE_LOCATION_LINK_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:?GOOGLE_OAUTH_CLIENT_ID is required}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-2}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      ALLOW_DEV_AUTH_CODES: ${ALLOW_DEV_AUTH_CODES:-false}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:?METRICS_BEARER_TOKEN is required}
    depends_on:
      postgres-postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_started
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4000/v1/health/ready',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5
    networks:
      - the-eye-internal

  admin-web:
    build:
      context: ../..
      dockerfile: apps/admin-web/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_APP_ENV: ${ADMIN_WEB_APP_ENV:-staging}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/v1}
    image: the-eye-admin-web:${THE_EYE_IMAGE_TAG:-local}
    container_name: the-eye-admin-web
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      NODE_ENV: production
      API_ORIGIN: ${API_ORIGIN:-http://api:4000}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-wss://localhost/livekit}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5
    networks:
      - the-eye-internal

  nginx:
    image: nginx:1.27-alpine
    container_name: the-eye-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      admin-web:
        condition: service_healthy
    environment:
      THE_EYE_SERVER_NAME: ${THE_EYE_SERVER_NAME:-localhost}
      THE_EYE_SSL_REDIRECT: ${THE_EYE_SSL_REDIRECT:-false}
      THE_EYE_GENERATE_DEV_SSL: ${THE_EYE_GENERATE_DEV_SSL:-false}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/render:/etc/nginx/render:ro
      - ./nginx/entrypoint.d:/docker-entrypoint.d:ro
      - ./nginx/certs:/etc/nginx/certs
      - certbot_www:/var/www/certbot:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - the-eye-internal
      - the-eye-public

  certbot:
    image: certbot/certbot:v3.1.0
    container_name: the-eye-certbot
    profiles: ["certbot"]
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - the-eye-public

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: the-eye-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/metrics_token:/etc/prometheus/metrics_token:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - the-eye-internal

  api-migrate:
    image: the-eye-api:${THE_EYE_IMAGE_TAG:-local}
    profiles: ["tools"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL:-${DATABASE_URL}}
    depends_on:
      postgres-postgis:
        condition: service_healthy
    command: ["npm", "--workspace", "apps/api", "run", "prisma:deploy"]
    networks:
      - the-eye-internal

  api-seed:
    image: the-eye-api:${THE_EYE_IMAGE_TAG:-local}
    profiles: ["tools"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_DIRECT_URL:-${DATABASE_URL:?DATABASE_URL is required}}
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL:-${DATABASE_URL}}
    depends_on:
      postgres-postgis:
        condition: service_healthy
    command: ["npm", "--workspace", "apps/api", "run", "db:seed"]
    networks:
      - the-eye-internal

networks:
  the-eye-internal:
    driver: bridge
    internal: true
  the-eye-public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_cache:
  certbot_www:
  prometheus_data:

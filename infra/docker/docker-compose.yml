name: the-eye

services:
  postgres-postgis:
    image: postgis/postgis:16-3.4
    container_name: the-eye-postgres-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-the_eye}
      POSTGRES_USER: ${POSTGRES_USER:-the_eye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - the-eye-internal

  redis:
    image: redis:7-alpine
    container_name: the-eye-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - the-eye-internal

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: the-eye-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-the_eye_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_secret}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - the-eye-internal

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    container_name: the-eye-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-the_eye_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_secret}
      S3_BUCKET: ${S3_BUCKET:-the-eye}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc anonymous set none local/$${S3_BUCKET};
      "
    networks:
      - the-eye-internal

  livekit:
    image: livekit/livekit-server:v1.8
    container_name: the-eye-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit/livekit.yaml"]
    environment:
      LIVEKIT_KEYS: ${LIVEKIT_API_KEY:-devkey}:${LIVEKIT_API_SECRET:-devsecret}
    ports:
      - "${LIVEKIT_HTTP_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_RTC_UDP_PORT:-7882}:7882/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "livekit-server", "--version"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - the-eye-internal

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: production
    image: the-eye-api:${THE_EYE_IMAGE_TAG:-local}
    container_name: the-eye-api
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://the_eye:change_me_postgres@postgres-postgis:5432/the_eye?schema=public}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-the-eye}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-the_eye_minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change_me_minio_secret}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
    depends_on:
      postgres-postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_started
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4000/v1/docs',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5
    networks:
      - the-eye-internal

  admin-web:
    build:
      context: ../..
      dockerfile: apps/admin-web/Dockerfile
      target: production
    image: the-eye-admin-web:${THE_EYE_IMAGE_TAG:-local}
    container_name: the-eye-admin-web
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/v1}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-wss://localhost/livekit}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5
    networks:
      - the-eye-internal

  nginx:
    image: nginx:1.27-alpine
    container_name: the-eye-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      admin-web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - the-eye-internal
      - the-eye-public

  api-migrate:
    image: the-eye-api:${THE_EYE_IMAGE_TAG:-local}
    profiles: ["tools"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://the_eye:change_me_postgres@postgres-postgis:5432/the_eye?schema=public}
    depends_on:
      postgres-postgis:
        condition: service_healthy
    command: ["npm", "--workspace", "apps/api", "run", "prisma:deploy"]
    networks:
      - the-eye-internal

  api-seed:
    image: the-eye-api:${THE_EYE_IMAGE_TAG:-local}
    profiles: ["tools"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://the_eye:change_me_postgres@postgres-postgis:5432/the_eye?schema=public}
    depends_on:
      postgres-postgis:
        condition: service_healthy
    command: ["npm", "--workspace", "apps/api", "run", "db:seed"]
    networks:
      - the-eye-internal

networks:
  the-eye-internal:
    driver: bridge
    internal: true
  the-eye-public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_cache:

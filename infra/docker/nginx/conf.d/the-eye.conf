upstream the_eye_api {
  server api:4000;
}

upstream the_eye_admin_web {
  server admin-web:3000;
}

upstream the_eye_livekit {
  server livekit:7880;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /v1/ {
    proxy_pass http://the_eye_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location /docs {
    proxy_pass http://the_eye_api;
    proxy_http_version 1.1;
  }

  location /livekit/ {
    proxy_pass http://the_eye_livekit/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
  }

  location / {
    proxy_pass http://the_eye_admin_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}


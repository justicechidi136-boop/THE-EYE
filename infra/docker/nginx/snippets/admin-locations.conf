# Admin dashboard upstream only. LiveKit and canonical API use dedicated hostnames.

# DEPRECATED — legacy unified routing on admin hostname. Remove after migration.
# Canonical API: https://staging-api.theeye.com.ng/v1 (NOT this path).
location /v1/ {
  limit_req zone=api_per_ip burst=60 nodelay;
  proxy_pass http://the_eye_api;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

location / {
  proxy_pass http://the_eye_admin_web;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
}

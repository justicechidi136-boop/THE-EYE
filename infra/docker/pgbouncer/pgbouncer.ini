[databases]
the_eye = host=postgres-postgis port=5432 dbname=the_eye

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
admin_users = the_eye
stats_users = the_eye

; Transaction pooling is recommended for Prisma + NestJS stateless API workers.
pool_mode = transaction
max_client_conn = 2000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
server_reset_query = DISCARD ALL
server_idle_timeout = 60
query_timeout = 0
client_idle_timeout = 0

; Prisma uses prepared statements; disable them when pooling in transaction mode.
ignore_startup_parameters = extra_float_digits

log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# Manual deployment only — does NOT run on push.
# Run after validate-staging.yml or validate-production.yml passes.
# DigitalOcean/server deploy is intentionally gated behind workflow_dispatch.
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: Docker image tag (THE_EYE_IMAGE_TAG)
        required: false
        default: ${{ github.sha }}
      run_migrations:
        description: Run prisma migrate deploy
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.event.inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.repository_owner != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate admin-web build args
        run: |
          if [ -z "${{ vars.NEXT_PUBLIC_API_BASE_URL }}" ]; then
            echo "GitHub environment '${{ github.event.inputs.environment }}' must define vars.NEXT_PUBLIC_API_BASE_URL"
            exit 1
          fi
          case "${{ github.event.inputs.environment }}" in
            staging)
              if echo "${{ vars.NEXT_PUBLIC_API_BASE_URL }}" | grep -Eiq 'localhost|127\.0\.0\.1|api\.theeye\.com\.ng'; then
                echo "Staging NEXT_PUBLIC_API_BASE_URL must not use localhost or production API hosts"
                exit 1
              fi
              ;;
            production)
              if echo "${{ vars.NEXT_PUBLIC_API_BASE_URL }}" | grep -Eiq 'localhost|127\.0\.0\.1|staging-api'; then
                echo "Production NEXT_PUBLIC_API_BASE_URL must not use localhost or staging API hosts"
                exit 1
              fi
              ;;
          esac

      - name: Build and push admin-web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-web/Dockerfile
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            NEXT_PUBLIC_APP_ENV=${{ github.event.inputs.environment }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          tags: |
            ghcr.io/${{ github.repository }}/admin-web:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}/admin-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            export THE_EYE_IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            export ADMIN_WEB_APP_ENV=${{ github.event.inputs.environment }}
            export NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            git fetch --tags origin
            git checkout ${{ github.sha }}
            docker compose -f infra/docker/docker-compose.yml --env-file .env pull api admin-web || true
            docker compose -f infra/docker/docker-compose.yml --env-file .env build api admin-web
            ${{ github.event.inputs.run_migrations && 'docker compose -f infra/docker/docker-compose.yml --env-file .env --profile tools run --rm api-migrate' || 'echo "Skipping migrations"' }}
            docker compose -f infra/docker/docker-compose.yml --env-file .env up -d --wait
            curl -fsS http://127.0.0.1/healthz
            curl -fsSk https://127.0.0.1/v1/health/ready || curl -fsS http://127.0.0.1/v1/health/ready

      - name: Post-deploy smoke (optional)
        if: ${{ vars.SMOKE_BASE_URL != '' }}
        run: |
          curl -fsS "${{ vars.SMOKE_BASE_URL }}/v1/health"
          curl -fsS "${{ vars.SMOKE_BASE_URL }}/v1/health/ready"

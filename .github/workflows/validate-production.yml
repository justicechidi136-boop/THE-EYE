# Production validation — runs on pushes to main, releases, and manual dispatch.
#
# Job A (production-static-validation): source/manifest checks — no production secrets required.
# Job B (production-release-build): release artifacts — REQUIRES production secrets/vars; fail closed.
# Job C (production-deploy): see deploy.yml — manual, requires Job B success.
#
# GitHub UI (Settings → Environments → production):
#   - Required reviewers for Job B and deploy.
#   - Vars: NEXT_PUBLIC_API_BASE_URL, THE_EYE_APP_ENV, FCM_PROJECT_ID, FIREBASE_PROJECT_ID
#   - Secrets: FCM_*, MOBILE_GOOGLE_SERVICES_JSON, WATCH_GOOGLE_SERVICES_JSON
name: Validate Production

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: production-validate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CI_STATIC_COMPILE_API_URL: https://production-ci-compile.theeye.internal
  PRODUCTION_FIREBASE_PROJECT_ID: the-eye-2pd-d0217

jobs:
  # ---------------------------------------------------------------------------
  # Job A — static validation (no GitHub production secrets required)
  # ---------------------------------------------------------------------------
  production-static-validation:
    name: Production static validation (Job A)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: the_eye
          POSTGRES_USER: the_eye
          POSTGRES_PASSWORD: ci_postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U the_eye -d the_eye"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      THE_EYE_APP_ENV: production
      FCM_PROJECT_ID: the-eye-2pd-d0217
      FIREBASE_PROJECT_ID: the-eye-2pd-d0217
      FCM_MODE: real
      FCM_ALLOW_SIMULATION: "false"
      FCM_SIMULATION_MODE: "false"
      THE_EYE_DISABLE_REDIS: "0"
      DATABASE_URL: postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public&connection_limit=5&pool_timeout=20
      DATABASE_DIRECT_URL: postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci_access_secret_32_chars_minimum
      JWT_REFRESH_SECRET: ci_refresh_secret_32_chars_minimum
      LIVE_LOCATION_LINK_SECRET: ci_live_location_secret_32_chars
      LIVEKIT_API_KEY: ci_livekit_api_key_32_chars_minimum
      LIVEKIT_API_SECRET: ci_livekit_api_secret_32_chars_minimum
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: the-eye
      S3_ACCESS_KEY: ci_s3_access_key
      S3_SECRET_KEY: ci_s3_secret_key_32_chars_minimum
      CORS_ORIGINS: https://api.theeye.com.ng
      GOOGLE_OAUTH_CLIENT_ID: ci-google-oauth-client-id
      METRICS_BEARER_TOKEN: ci_metrics_bearer_token_32_chars_min
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_API_BASE_URL: https://production-ci-compile.theeye.internal
      CI_STAGING_API_URL: https://staging-api.theeye.com.ng
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Static validation manifest report
        run: node scripts/ci/production-readiness-report.mjs --mode static-report

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production Firebase environment guard (manifest)
        run: |
          set -euo pipefail
          test "${THE_EYE_APP_ENV}" = "production"
          test "${FCM_PROJECT_ID}" = "the-eye-2pd-d0217"
          test "${FIREBASE_PROJECT_ID}" = "the-eye-2pd-d0217"
          for forbidden in the-eye-2stg the-eye-29cff staging-api localhost 127.0.0.1; do
            if echo "${FCM_PROJECT_ID} ${FIREBASE_PROJECT_ID}" | grep -qi "${forbidden}"; then
              echo "Production guard rejected forbidden identifier: ${forbidden}"
              exit 1
            fi
          done

      - name: Firebase guard unit tests
        run: pnpm run test:firebase:guard

      - name: Generate Prisma client
        run: pnpm run prisma:generate:api

      - name: Lint API
        run: pnpm --filter @the-eye/api run lint

      - name: Validate Prisma schema
        run: pnpm --filter @the-eye/api exec prisma validate

      - name: Validate migrations against schema
        run: |
          pnpm --filter @the-eye/api exec prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "${DATABASE_DIRECT_URL}"

      - name: Apply migrations
        run: pnpm --filter @the-eye/api exec prisma migrate deploy

      - name: Backend tests
        run: pnpm run test:backend

      - name: Build API (compile validation only)
        run: pnpm --filter @the-eye/api run build

      - name: Lint admin-web (compile validation only)
        run: pnpm --filter @the-eye/admin-web run lint

      - name: Admin compile validation (non-deploying CI URL)
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.CI_STATIC_COMPILE_API_URL }}
        run: |
          set -euo pipefail
          case "${NEXT_PUBLIC_API_BASE_URL}" in
            https://*) ;;
            *) echo "Static compile URL must be HTTPS"; exit 1 ;;
          esac
          pnpm --filter @the-eye/admin-web run build
          node scripts/validate-admin-next-bundle.cjs apps/admin-web/.next production "${NEXT_PUBLIC_API_BASE_URL}"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Mobile static validation (manifest fallback)
        run: |
          set -euo pipefail
          echo "SECRET NOT PROVIDED: MOBILE_GOOGLE_SERVICES_JSON"
          echo "MANIFEST FALLBACK USED: mobile Firebase wiring"
          echo "ARTIFACT BUILD NOT VERIFIED: mobile production APK"
          pnpm --dir apps/mobile run pub-get
          pnpm run mobile:analyze
          pnpm run test:firebase:auth-providers
          grep -q "com.theeye.app" apps/mobile/android/app/build.gradle

      - name: Watch static validation (manifest fallback)
        run: |
          set -euo pipefail
          echo "SECRET NOT PROVIDED: WATCH_GOOGLE_SERVICES_JSON"
          echo "MANIFEST FALLBACK USED: watch Firebase wiring"
          echo "ARTIFACT BUILD NOT VERIFIED: watch production APK"
          pnpm --dir apps/watch run pub-get
          pnpm run watch:analyze
          pnpm run test:firebase:auth-providers
          grep -q "com.theeye.app" apps/watch/android/app/build.gradle.kts || grep -q "applicationId" apps/watch/android/app/build.gradle.kts

      - name: Deploy env documentation
        run: pnpm run test:deploy:env

  # ---------------------------------------------------------------------------
  # Job B — release build gate (requires production environment secrets/vars)
  # ---------------------------------------------------------------------------
  production-release-gate:
    name: Production release gate (Job B)
    needs: production-static-validation
    runs-on: ubuntu-latest
    environment: production
    outputs:
      mobile_firebase_secret: ${{ steps.presence.outputs.mobile_firebase_secret }}
      watch_firebase_secret: ${{ steps.presence.outputs.watch_firebase_secret }}
      production_api_url: ${{ steps.presence.outputs.production_api_url }}
      gate_passed: ${{ steps.gate.outcome == 'success' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Record secret/var presence
        id: presence
        env:
          MOBILE_GOOGLE_SERVICES_JSON: ${{ secrets.MOBILE_GOOGLE_SERVICES_JSON }}
          WATCH_GOOGLE_SERVICES_JSON: ${{ secrets.WATCH_GOOGLE_SERVICES_JSON }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          if [ -n "${MOBILE_GOOGLE_SERVICES_JSON:-}" ]; then
            echo "mobile_firebase_secret=PRESENT" >> "$GITHUB_OUTPUT"
          else
            echo "mobile_firebase_secret=MISSING" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${WATCH_GOOGLE_SERVICES_JSON:-}" ]; then
            echo "watch_firebase_secret=PRESENT" >> "$GITHUB_OUTPUT"
          else
            echo "watch_firebase_secret=MISSING" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${NEXT_PUBLIC_API_BASE_URL:-}" ]; then
            echo "production_api_url=PRESENT" >> "$GITHUB_OUTPUT"
          else
            echo "production_api_url=MISSING" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail closed — require production release secrets
        id: gate
        env:
          MOBILE_GOOGLE_SERVICES_JSON: ${{ secrets.MOBILE_GOOGLE_SERVICES_JSON }}
          WATCH_GOOGLE_SERVICES_JSON: ${{ secrets.WATCH_GOOGLE_SERVICES_JSON }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: node scripts/ci/production-readiness-report.mjs --mode release-gate

  release-api:
    name: Release — API build
    needs: production-release-gate
    if: needs.production-release-gate.outputs.gate_passed == 'true'
    runs-on: ubuntu-latest
    environment: production
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: the_eye
          POSTGRES_USER: the_eye
          POSTGRES_PASSWORD: ci_postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U the_eye -d the_eye"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      THE_EYE_APP_ENV: ${{ vars.THE_EYE_APP_ENV }}
      FCM_PROJECT_ID: ${{ vars.FCM_PROJECT_ID }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FCM_CLIENT_EMAIL: ${{ secrets.FCM_CLIENT_EMAIL }}
      FCM_PRIVATE_KEY: ${{ secrets.FCM_PRIVATE_KEY }}
      FCM_MODE: real
      FCM_ALLOW_SIMULATION: "false"
      FCM_SIMULATION_MODE: "false"
      THE_EYE_DISABLE_REDIS: "0"
      DATABASE_URL: postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public&connection_limit=5&pool_timeout=20
      DATABASE_DIRECT_URL: postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci_access_secret_32_chars_minimum
      JWT_REFRESH_SECRET: ci_refresh_secret_32_chars_minimum
      LIVE_LOCATION_LINK_SECRET: ci_live_location_secret_32_chars
      LIVEKIT_API_KEY: ci_livekit_api_key_32_chars_minimum
      LIVEKIT_API_SECRET: ci_livekit_api_secret_32_chars_minimum
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: the-eye
      S3_ACCESS_KEY: ci_s3_access_key
      S3_SECRET_KEY: ci_s3_secret_key_32_chars_minimum
      CORS_ORIGINS: https://api.theeye.com.ng
      GOOGLE_OAUTH_CLIENT_ID: ci-google-oauth-client-id
      METRICS_BEARER_TOKEN: ci_metrics_bearer_token_32_chars_min
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Require production environment vars (no fallback)
        run: |
          set -euo pipefail
          APP_ENV="${{ vars.THE_EYE_APP_ENV }}"
          FCM_ID="${{ vars.FCM_PROJECT_ID }}"
          FB_ID="${{ vars.FIREBASE_PROJECT_ID }}"
          if [ -z "$APP_ENV" ] || [ -z "$FCM_ID" ] || [ -z "$FB_ID" ]; then
            echo "THE_EYE_APP_ENV, FCM_PROJECT_ID, and FIREBASE_PROJECT_ID must be set in production environment"
            exit 1
          fi
          echo "THE_EYE_APP_ENV=$APP_ENV" >> "$GITHUB_ENV"
          echo "FCM_PROJECT_ID=$FCM_ID" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$FB_ID" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production Firebase environment guard
        run: |
          set -euo pipefail
          test "${THE_EYE_APP_ENV}" = "production"
          test "${FCM_PROJECT_ID}" = "the-eye-2pd-d0217"
          test "${FIREBASE_PROJECT_ID}" = "the-eye-2pd-d0217"

      - name: Firebase production guard script
        run: pnpm run firebase:guard:production

      - name: Generate Prisma client
        run: pnpm run prisma:generate:api

      - name: Build API
        run: pnpm --filter @the-eye/api run build

  release-admin:
    name: Release — admin bundle
    needs: production-release-gate
    if: needs.production-release-gate.outputs.gate_passed == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      NEXT_PUBLIC_APP_ENV: production
      CI_STAGING_API_URL: https://staging-api.theeye.com.ng
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Require NEXT_PUBLIC_API_BASE_URL (no fallback)
        run: |
          set -euo pipefail
          URL="${{ vars.NEXT_PUBLIC_API_BASE_URL }}"
          if [ -z "$URL" ]; then
            echo "NEXT_PUBLIC_API_BASE_URL must be set in production environment — no fallback for release build"
            exit 1
          fi
          URL="$URL" node -e "
            import { validateProductionApiUrl } from './scripts/ci/production-readiness-report.mjs';
            const result = validateProductionApiUrl(process.env.URL);
            if (!result.ok) { console.error(result.reason); process.exit(1); }
          "
          echo "NEXT_PUBLIC_API_BASE_URL=$URL" >> "$GITHUB_ENV"
          echo "CI_PRODUCTION_API_URL=$URL" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin-web (production release)
        run: pnpm --filter @the-eye/admin-web run build

      - name: Validate production bundle isolation
        run: node scripts/validate-admin-next-bundle.cjs apps/admin-web/.next production "${NEXT_PUBLIC_API_BASE_URL}"

  release-mobile:
    name: Release — mobile APK
    needs: production-release-gate
    if: needs.production-release-gate.outputs.gate_passed == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Materialize mobile google-services.json (production secret)
        env:
          MOBILE_GOOGLE_SERVICES_JSON: ${{ secrets.MOBILE_GOOGLE_SERVICES_JSON }}
          MOBILE_GOOGLE_SERVICES_JSON_DEVELOPMENT: ${{ secrets.MOBILE_GOOGLE_SERVICES_JSON_DEVELOPMENT }}
          MOBILE_GOOGLE_SERVICES_JSON_STAGING: ${{ secrets.MOBILE_GOOGLE_SERVICES_JSON_STAGING }}
        run: |
          set -euo pipefail
          if [ -z "${MOBILE_GOOGLE_SERVICES_JSON:-}" ]; then
            echo "MOBILE_GOOGLE_SERVICES_JSON is required for release build"
            exit 1
          fi
          node -e "
            import { validateProductionGoogleServicesJson } from './scripts/ci/production-readiness-report.mjs';
            const result = validateProductionGoogleServicesJson(process.env.MOBILE_GOOGLE_SERVICES_JSON);
            if (!result.ok) { console.error(result.reason); process.exit(1); }
          "
          write_json() {
            local flavor="$1"
            local payload="$2"
            mkdir -p "apps/mobile/android/app/src/${flavor}"
            printf '%s' "$payload" > "apps/mobile/android/app/src/${flavor}/google-services.json"
          }
          write_json production "$MOBILE_GOOGLE_SERVICES_JSON"
          if [ -n "${MOBILE_GOOGLE_SERVICES_JSON_DEVELOPMENT:-}" ]; then
            write_json development "$MOBILE_GOOGLE_SERVICES_JSON_DEVELOPMENT"
          fi
          if [ -n "${MOBILE_GOOGLE_SERVICES_JSON_STAGING:-}" ]; then
            write_json staging "$MOBILE_GOOGLE_SERVICES_JSON_STAGING"
          fi

      - name: Install mobile dependencies
        run: pnpm --dir apps/mobile run pub-get

      - name: Analyze
        run: pnpm run mobile:analyze

      - name: Validate mobile Firebase wiring (production)
        run: |
          set -euo pipefail
          pnpm run test:firebase:auth-providers
          pnpm run test:mobile:firebase

      - name: Build production APK
        run: pnpm --dir apps/mobile exec flutter build apk --flavor production --release

      - name: Assert production package name
        run: grep -q "com.theeye.app" apps/mobile/android/app/build.gradle

  release-watch:
    name: Release — watch APK
    needs: production-release-gate
    if: needs.production-release-gate.outputs.gate_passed == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Materialize watch google-services.json (production secret)
        env:
          WATCH_GOOGLE_SERVICES_JSON: ${{ secrets.WATCH_GOOGLE_SERVICES_JSON }}
          WATCH_GOOGLE_SERVICES_JSON_DEVELOPMENT: ${{ secrets.WATCH_GOOGLE_SERVICES_JSON_DEVELOPMENT }}
          WATCH_GOOGLE_SERVICES_JSON_STAGING: ${{ secrets.WATCH_GOOGLE_SERVICES_JSON_STAGING }}
        run: |
          set -euo pipefail
          if [ -z "${WATCH_GOOGLE_SERVICES_JSON:-}" ]; then
            echo "WATCH_GOOGLE_SERVICES_JSON is required for release build"
            exit 1
          fi
          node -e "
            import { validateProductionGoogleServicesJson } from './scripts/ci/production-readiness-report.mjs';
            const result = validateProductionGoogleServicesJson(process.env.WATCH_GOOGLE_SERVICES_JSON);
            if (!result.ok) { console.error(result.reason); process.exit(1); }
          "
          write_json() {
            local flavor="$1"
            local payload="$2"
            mkdir -p "apps/watch/android/app/src/${flavor}"
            printf '%s' "$payload" > "apps/watch/android/app/src/${flavor}/google-services.json"
          }
          write_json production "$WATCH_GOOGLE_SERVICES_JSON"
          if [ -n "${WATCH_GOOGLE_SERVICES_JSON_DEVELOPMENT:-}" ]; then
            write_json development "$WATCH_GOOGLE_SERVICES_JSON_DEVELOPMENT"
          fi
          if [ -n "${WATCH_GOOGLE_SERVICES_JSON_STAGING:-}" ]; then
            write_json staging "$WATCH_GOOGLE_SERVICES_JSON_STAGING"
          fi

      - name: Install watch dependencies
        run: pnpm --dir apps/watch run pub-get

      - name: Analyze
        run: pnpm run watch:analyze

      - name: Validate watch Firebase wiring (production)
        run: |
          set -euo pipefail
          pnpm run test:firebase:auth-providers
          pnpm run test:watch:firebase

      - name: Build production APK
        run: pnpm --dir apps/watch exec flutter build apk --flavor production --release

  release-artifact-scan:
    name: Release — artifact leakage scan
    needs: [production-release-gate, release-admin, release-api]
    if: needs.production-release-gate.outputs.gate_passed == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Require NEXT_PUBLIC_API_BASE_URL (no fallback)
        run: |
          set -euo pipefail
          URL="${{ vars.NEXT_PUBLIC_API_BASE_URL }}"
          if [ -z "$URL" ]; then
            echo "NEXT_PUBLIC_API_BASE_URL must be set for artifact scan"
            exit 1
          fi
          echo "NEXT_PUBLIC_API_BASE_URL=$URL" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild production artifacts for scan
        env:
          NEXT_PUBLIC_APP_ENV: production
        run: |
          pnpm run prisma:generate:api
          pnpm --filter @the-eye/api run build
          pnpm --filter @the-eye/admin-web run build

      - name: Scan built outputs for staging/dev identifiers
        run: |
          set -euo pipefail
          LEAK_PATTERN='the-eye-2stg|the-eye-29cff|localhost|127\.0\.0\.1|staging-api'
          TARGETS="apps/admin-web/.next apps/api/dist"
          for target in $TARGETS; do
            if [ ! -d "$target" ]; then
              echo "Missing scan target: $target"
              exit 1
            fi
          done
          if grep -rE --include='*.js' --include='*.json' --include='*.html' --include='*.txt' --include='*.map' "$LEAK_PATTERN" $TARGETS; then
            echo "Artifact leakage scan failed"
            exit 1
          fi
          echo "Artifact leakage scan passed."

      - name: Auth provider cross-env check
        run: pnpm run test:firebase:auth-providers

  release-notes:
    name: Release — notes & version tag
    needs:
      - production-release-gate
      - release-api
      - release-admin
      - release-mobile
      - release-watch
      - release-artifact-scan
    if: needs.production-release-gate.outputs.gate_passed == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes draft
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          {
            echo "# THE EYE v${{ steps.version.outputs.version }}"
            echo
            if [ -n "${PREV_TAG}" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)"
            else
              git log -20 --pretty=format:"- %s (%h)"
            fi
          } | tee release-notes.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-v${{ steps.version.outputs.version }}
          path: release-notes.md
          retention-days: 90

      - name: Create version tag (workflow_dispatch / release only)
        if: github.event_name != 'push'
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "THE EYE release ${TAG}"
          git push origin "$TAG"

  production-readiness-report:
    name: Production readiness report
    needs:
      - production-static-validation
      - production-release-gate
      - release-api
      - release-admin
      - release-mobile
      - release-watch
      - release-artifact-scan
      - release-notes
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Emit GO/NO-GO report
        env:
          MOBILE_GOOGLE_SERVICES_JSON: ${{ needs.production-release-gate.outputs.mobile_firebase_secret == 'PRESENT' && 'configured' || '' }}
          WATCH_GOOGLE_SERVICES_JSON: ${{ needs.production-release-gate.outputs.watch_firebase_secret == 'PRESENT' && 'configured' || '' }}
          NEXT_PUBLIC_API_BASE_URL: ${{ needs.production-release-gate.outputs.production_api_url == 'PRESENT' && 'configured' || '' }}
          STATIC_VALIDATION_RESULT: ${{ needs.production-static-validation.result }}
          RELEASE_BUILD_RESULT: ${{ needs.production-release-gate.outputs.gate_passed == 'true' && needs.release-notes.result || needs.production-release-gate.result }}
        run: node scripts/ci/production-readiness-report.mjs --mode summary

# Staging validation — runs on pushes to staging and manual dispatch.
# Uses GitHub environment "staging" for environment-scoped vars/secrets.
# Does NOT access the production environment or production secrets.
# Does NOT deploy to DigitalOcean.
name: Validate Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API lint, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: the_eye
          POSTGRES_USER: the_eye
          POSTGRES_PASSWORD: ci_postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U the_eye -d the_eye"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      THE_EYE_APP_ENV: ${{ vars.THE_EYE_APP_ENV }}
      FCM_PROJECT_ID: ${{ vars.FCM_PROJECT_ID }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      DATABASE_URL: postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public&connection_limit=5&pool_timeout=20
      DATABASE_DIRECT_URL: postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci_access_secret_32_chars_minimum
      JWT_REFRESH_SECRET: ci_refresh_secret_32_chars_minimum
      LIVE_LOCATION_LINK_SECRET: ci_live_location_secret_32_chars
      LIVEKIT_API_KEY: ci_livekit_api_key_32_chars_minimum
      LIVEKIT_API_SECRET: ci_livekit_api_secret_32_chars_minimum
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: the-eye
      S3_ACCESS_KEY: ci_s3_access_key
      S3_SECRET_KEY: ci_s3_secret_key_32_chars_minimum
      CORS_ORIGINS: https://staging-admin.theeye.com.ng
      GOOGLE_OAUTH_CLIENT_ID: ci-google-oauth-client-id
      METRICS_BEARER_TOKEN: ci_metrics_bearer_token_32_chars_min
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Resolve staging environment vars
        run: |
          APP_ENV="${{ vars.THE_EYE_APP_ENV }}"
          FCM_ID="${{ vars.FCM_PROJECT_ID }}"
          FB_ID="${{ vars.FIREBASE_PROJECT_ID }}"
          if [ -z "$APP_ENV" ]; then
            echo "::warning::THE_EYE_APP_ENV not set in staging environment; using canonical fallback"
            APP_ENV="staging"
          fi
          if [ -z "$FCM_ID" ]; then
            echo "::warning::FCM_PROJECT_ID not set in staging environment; using canonical fallback"
            FCM_ID="the-eye-2stg"
          fi
          if [ -z "$FB_ID" ]; then
            echo "::warning::FIREBASE_PROJECT_ID not set in staging environment; using canonical fallback"
            FB_ID="the-eye-2stg"
          fi
          echo "THE_EYE_APP_ENV=$APP_ENV" >> "$GITHUB_ENV"
          echo "FCM_PROJECT_ID=$FCM_ID" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$FB_ID" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Staging Firebase environment guard
        run: |
          set -euo pipefail
          test "${THE_EYE_APP_ENV}" = "staging"
          test "${FCM_PROJECT_ID}" = "the-eye-2stg"
          test "${FIREBASE_PROJECT_ID}" = "the-eye-2stg"
          for forbidden in the-eye-2pd-d0217 the-eye-29cff; do
            if echo "${FCM_PROJECT_ID} ${FIREBASE_PROJECT_ID}" | grep -q "${forbidden}"; then
              echo "Staging validation must not reference ${forbidden}"
              exit 1
            fi
          done

      - name: Generate Prisma client
        run: pnpm run prisma:generate:api

      - name: Lint API
        run: pnpm --filter @the-eye/api run lint

      - name: Validate Prisma schema
        run: pnpm --filter @the-eye/api exec prisma validate

      - name: Validate migrations against schema
        run: |
          set -euo pipefail
          export DATABASE_URL="postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public&connection_limit=5&pool_timeout=20"
          export DATABASE_DIRECT_URL="postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public"
          export SHADOW_DATABASE_URL="postgresql://the_eye:ci_postgres_password@localhost:5432/postgres"
          pnpm --filter @the-eye/api exec prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "${SHADOW_DATABASE_URL}"

      - name: Apply migrations
        run: |
          set -euo pipefail
          export DATABASE_URL="postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public&connection_limit=5&pool_timeout=20"
          export DATABASE_DIRECT_URL="postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public"
          pnpm --filter @the-eye/api exec prisma migrate deploy

      - name: Backend tests
        run: |
          set -euo pipefail
          export DATABASE_URL="postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public&connection_limit=5&pool_timeout=20"
          export DATABASE_DIRECT_URL="postgresql://the_eye:ci_postgres_password@localhost:5432/the_eye?schema=public"
          export THE_EYE_APP_ENV="staging"
          export FCM_PROJECT_ID="the-eye-2stg"
          export FIREBASE_PROJECT_ID="the-eye-2stg"
          export FCM_MODE="real"
          export FCM_ALLOW_SIMULATION="false"
          export FCM_SIMULATION_MODE="false"
          export THE_EYE_DISABLE_REDIS="1"
          export NODE_ENV="test"
          export REDIS_HOST="localhost"
          export REDIS_PORT="6379"
          export JWT_ACCESS_SECRET="ci_access_secret_32_chars_minimum"
          export JWT_REFRESH_SECRET="ci_refresh_secret_32_chars_minimum"
          export LIVE_LOCATION_LINK_SECRET="ci_live_location_secret_32_chars"
          export LIVEKIT_API_KEY="ci_livekit_api_key_32_chars_minimum"
          export LIVEKIT_API_SECRET="ci_livekit_api_secret_32_chars_minimum"
          export S3_ENDPOINT="http://localhost:9000"
          export S3_BUCKET="the-eye"
          export S3_ACCESS_KEY="ci_s3_access_key"
          export S3_SECRET_KEY="ci_s3_secret_key_32_chars_minimum"
          export CORS_ORIGINS="https://staging-admin.theeye.com.ng"
          export GOOGLE_OAUTH_CLIENT_ID="ci-google-oauth-client-id"
          unset METRICS_BEARER_TOKEN
          unset FCM_CLIENT_EMAIL
          unset FCM_PRIVATE_KEY
          env -u METRICS_BEARER_TOKEN -u FCM_CLIENT_EMAIL -u FCM_PRIVATE_KEY pnpm run test:backend

      - name: Build API
        run: pnpm --filter @the-eye/api run build

  admin:
    name: Admin lint & build
    runs-on: ubuntu-latest
    environment: staging
    env:
      NEXT_PUBLIC_APP_ENV: staging
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
      CI_STAGING_API_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
      CI_PRODUCTION_API_URL: https://api.theeye.com.ng
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Resolve NEXT_PUBLIC_API_BASE_URL
        run: |
          set -euo pipefail
          URL="${{ vars.NEXT_PUBLIC_API_BASE_URL }}"
          if [ -z "$URL" ]; then
            echo "::warning::NEXT_PUBLIC_API_BASE_URL not set in staging environment; using canonical fallback"
            URL="https://staging-api.theeye.com.ng"
          fi
          URL="$URL" node scripts/ci/validate-staging-api-url.mjs "$URL"
          echo "NEXT_PUBLIC_API_BASE_URL=$URL" >> "$GITHUB_ENV"
          echo "CI_STAGING_API_URL=$URL" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint admin-web
        run: pnpm --filter @the-eye/admin-web run lint

      - name: Build admin-web (staging)
        run: pnpm --filter @the-eye/admin-web run build

      - name: Validate staging bundle isolation
        run: node scripts/validate-admin-next-bundle.cjs apps/admin-web/.next staging "${NEXT_PUBLIC_API_BASE_URL}"

  mobile:
    name: Mobile staging analyze, test, build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Materialize mobile google-services.json files
        id: mobile_gs_json
        env:
          MOBILE_GOOGLE_SERVICES_JSON: ${{ secrets.MOBILE_GOOGLE_SERVICES_JSON }}
          MOBILE_GOOGLE_SERVICES_JSON_DEVELOPMENT: ${{ secrets.MOBILE_GOOGLE_SERVICES_JSON_DEVELOPMENT }}
          MOBILE_GOOGLE_SERVICES_JSON_PRODUCTION: ${{ secrets.MOBILE_GOOGLE_SERVICES_JSON_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${MOBILE_GOOGLE_SERVICES_JSON:-}" ]; then
            echo "::warning::staging secret MOBILE_GOOGLE_SERVICES_JSON is not set — skipping google-services materialization, full Firebase validation, and staging APK build"
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_secret=true" >> "$GITHUB_OUTPUT"
          write_json() {
            local flavor="$1"
            local payload="$2"
            mkdir -p "apps/mobile/android/app/src/${flavor}"
            printf '%s' "$payload" > "apps/mobile/android/app/src/${flavor}/google-services.json"
          }
          write_json staging "$MOBILE_GOOGLE_SERVICES_JSON"
          if [ -n "${MOBILE_GOOGLE_SERVICES_JSON_DEVELOPMENT:-}" ]; then
            write_json development "$MOBILE_GOOGLE_SERVICES_JSON_DEVELOPMENT"
          fi
          if [ -n "${MOBILE_GOOGLE_SERVICES_JSON_PRODUCTION:-}" ]; then
            write_json production "$MOBILE_GOOGLE_SERVICES_JSON_PRODUCTION"
          fi
          node -e "
            const fs=require('fs');
            const j=JSON.parse(fs.readFileSync('apps/mobile/android/app/src/staging/google-services.json','utf8'));
            if(j.project_info.project_id!=='the-eye-2stg'){console.error('staging google-services.json project_id mismatch');process.exit(1);}
          "

      - name: Install mobile dependencies
        run: pnpm --dir apps/mobile run pub-get

      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze lib test --no-fatal-infos --no-fatal-warnings

      - name: Test
        working-directory: apps/mobile
        run: flutter test

      - name: Validate mobile Firebase wiring
        run: |
          set -euo pipefail
          echo "Running auth-provider manifest validation (always)"
          node scripts/validate-firebase-auth-providers.cjs
          if [ "${{ steps.mobile_gs_json.outputs.has_secret }}" != "true" ]; then
            echo "::warning::MOBILE_GOOGLE_SERVICES_JSON not set — skipped test:mobile:firebase and staging APK build"
            exit 0
          fi
          if [ -f apps/mobile/android/app/src/development/google-services.json ] && \
             [ -f apps/mobile/android/app/src/production/google-services.json ]; then
            echo "All flavor secrets present — running full mobile Firebase validation"
            pnpm run test:mobile:firebase
          else
            echo "::warning::Partial flavor secrets — skipped test:mobile:firebase (auth-provider manifest validation passed)"
          fi

      - name: Build staging APK
        if: steps.mobile_gs_json.outputs.has_secret == 'true'
        run: pnpm --dir apps/mobile exec flutter build apk --flavor staging

  watch:
    name: Watch staging analyze, test, build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Materialize watch google-services.json files
        id: watch_gs_json
        env:
          WATCH_GOOGLE_SERVICES_JSON: ${{ secrets.WATCH_GOOGLE_SERVICES_JSON }}
          WATCH_GOOGLE_SERVICES_JSON_DEVELOPMENT: ${{ secrets.WATCH_GOOGLE_SERVICES_JSON_DEVELOPMENT }}
          WATCH_GOOGLE_SERVICES_JSON_PRODUCTION: ${{ secrets.WATCH_GOOGLE_SERVICES_JSON_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${WATCH_GOOGLE_SERVICES_JSON:-}" ]; then
            echo "::warning::staging secret WATCH_GOOGLE_SERVICES_JSON is not set — skipping google-services materialization, full Firebase validation, and staging APK build"
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_secret=true" >> "$GITHUB_OUTPUT"
          write_json() {
            local flavor="$1"
            local payload="$2"
            mkdir -p "apps/watch/android/app/src/${flavor}"
            printf '%s' "$payload" > "apps/watch/android/app/src/${flavor}/google-services.json"
          }
          write_json staging "$WATCH_GOOGLE_SERVICES_JSON"
          if [ -n "${WATCH_GOOGLE_SERVICES_JSON_DEVELOPMENT:-}" ]; then
            write_json development "$WATCH_GOOGLE_SERVICES_JSON_DEVELOPMENT"
          fi
          if [ -n "${WATCH_GOOGLE_SERVICES_JSON_PRODUCTION:-}" ]; then
            write_json production "$WATCH_GOOGLE_SERVICES_JSON_PRODUCTION"
          fi

      - name: Install watch dependencies
        run: pnpm --dir apps/watch run pub-get

      - name: Analyze
        working-directory: apps/watch
        run: flutter analyze lib test

      - name: Test
        working-directory: apps/watch
        run: flutter test

      - name: Validate watch Firebase wiring
        run: |
          set -euo pipefail
          echo "Running auth-provider manifest validation (always)"
          node scripts/validate-firebase-auth-providers.cjs
          if [ "${{ steps.watch_gs_json.outputs.has_secret }}" != "true" ]; then
            echo "::warning::WATCH_GOOGLE_SERVICES_JSON not set — skipped test:watch:firebase and staging APK build"
            exit 0
          fi
          if [ -f apps/watch/android/app/src/development/google-services.json ] && \
             [ -f apps/watch/android/app/src/production/google-services.json ]; then
            echo "All flavor secrets present — running full watch Firebase validation"
            pnpm run test:watch:firebase
          else
            echo "::warning::Partial flavor secrets — skipped test:watch:firebase (auth-provider manifest validation passed)"
          fi

      - name: Build staging debug APK
        if: steps.watch_gs_json.outputs.has_secret == 'true'
        run: pnpm --dir apps/watch exec flutter build apk --flavor staging --debug

  firebase:
    name: Firebase staging guards
    runs-on: ubuntu-latest
    environment: staging
    env:
      THE_EYE_APP_ENV: ${{ vars.THE_EYE_APP_ENV }}
      FCM_PROJECT_ID: ${{ vars.FCM_PROJECT_ID }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve staging environment vars
        run: |
          APP_ENV="${{ vars.THE_EYE_APP_ENV }}"
          FCM_ID="${{ vars.FCM_PROJECT_ID }}"
          FB_ID="${{ vars.FIREBASE_PROJECT_ID }}"
          if [ -z "$APP_ENV" ]; then
            echo "::warning::THE_EYE_APP_ENV not set in staging environment; using canonical fallback"
            APP_ENV="staging"
          fi
          if [ -z "$FCM_ID" ]; then
            echo "::warning::FCM_PROJECT_ID not set in staging environment; using canonical fallback"
            FCM_ID="the-eye-2stg"
          fi
          if [ -z "$FB_ID" ]; then
            echo "::warning::FIREBASE_PROJECT_ID not set in staging environment; using canonical fallback"
            FB_ID="the-eye-2stg"
          fi
          echo "THE_EYE_APP_ENV=$APP_ENV" >> "$GITHUB_ENV"
          echo "FCM_PROJECT_ID=$FCM_ID" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$FB_ID" >> "$GITHUB_ENV"

      - name: Staging Firebase guard
        run: |
          set -euo pipefail
          test "${THE_EYE_APP_ENV}" = "staging"
          test "${FCM_PROJECT_ID}" = "the-eye-2stg"
          test "${FIREBASE_PROJECT_ID}" = "the-eye-2stg"

      - name: Auth provider manifest validation
        run: node scripts/validate-firebase-auth-providers.cjs

  docker:
    name: Docker admin image (staging)
    runs-on: ubuntu-latest
    environment: staging
    env:
      CI_STAGING_API_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
      CI_PRODUCTION_API_URL: https://api.theeye.com.ng
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve NEXT_PUBLIC_API_BASE_URL
        run: |
          set -euo pipefail
          URL="${{ vars.NEXT_PUBLIC_API_BASE_URL }}"
          if [ -z "$URL" ]; then
            echo "::warning::NEXT_PUBLIC_API_BASE_URL not set in staging environment; using canonical fallback"
            URL="https://staging-api.theeye.com.ng"
          fi
          URL="$URL" node scripts/ci/validate-staging-api-url.mjs "$URL"
          echo "NEXT_PUBLIC_API_BASE_URL=$URL" >> "$GITHUB_ENV"
          echo "CI_STAGING_API_URL=$URL" >> "$GITHUB_ENV"

      - name: Build staging admin-web Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_ENV=staging \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL}" \
            -f apps/admin-web/Dockerfile \
            --target production \
            -t the-eye-admin:staging-validate \
            .

      - name: Validate staging Docker bundle isolation
        run: node scripts/validate-admin-docker-bundle.cjs the-eye-admin:staging-validate staging "${NEXT_PUBLIC_API_BASE_URL}"
